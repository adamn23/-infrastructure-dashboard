version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: infra_db
    restart: always
    environment:
      POSTGRES_USER: infra_user
      POSTGRES_PASSWORD: infra_pass
      POSTGRES_DB: infra_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infra_user -d infra_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: infra_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://infra_user:infra_pass@db:5432/infra_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: infra_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  postgres_data:
